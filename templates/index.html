<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Cognitive Load Detection</title>
    <!-- Use Inter and Outfit fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030305;
            --card-bg: rgba(20, 22, 28, 0.4);
            --card-border: rgba(255, 255, 255, 0.08);
            
            --primary: #00e5ff;
            --primary-glow: rgba(0, 229, 255, 0.6);
            
            --danger: #ff2a5f;
            --danger-glow: rgba(255, 42, 95, 0.6);
            
            --success: #00ff9d;
            --success-glow: rgba(0, 255, 157, 0.6);
            
            --warning: #ffb800;
            --warning-glow: rgba(255, 184, 0, 0.6);
            
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            overflow-x: hidden;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(20, 22, 28, 1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(20, 22, 28, 1) 0px, transparent 50%);
            color: var(--text-main);
            padding: 2rem;
            min-height: 100vh;
            transition: all 1s ease;
        }

        /* Ambient grid pattern */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -2;
            pointer-events: none;
        }

        /* Animated Background Blobs */
        .bg-blob {
            position: fixed; /* Fixed so they stay behind content when scrolling */
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.5;
            z-index: -1;
            animation: float 25s infinite ease-in-out alternate;
            transition: background 1.5s ease;
            pointer-events: none;
        }
        .blob-1 { top: -10%; left: -10%; width: 500px; height: 500px; background: var(--current-color, rgba(0, 229, 255, 0.15)); animation-delay: 0s; }
        .blob-2 { bottom: -20%; right: -10%; width: 600px; height: 600px; background: rgba(80, 50, 150, 0.2); animation-delay: -5s; }
        .blob-3 { top: 40%; left: 60%; width: 400px; height: 400px; background: var(--current-color, rgba(0, 255, 157, 0.15)); opacity: 0.3; animation-delay: -10s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            50% { transform: translate(80px, 80px) scale(1.1) rotate(180deg); }
            100% { transform: translate(-80px, 40px) scale(0.9) rotate(360deg); }
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto; /* Center horizontally */
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 1rem;
            animation: fadeInDown 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .subtitle {
            color: var(--primary);
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
            text-shadow: 0 0 20px var(--primary-glow);
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            perspective: 1000px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        
        /* Premium Card Glare Effect */
        .card::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.05), transparent);
            transform: skewX(-20deg);
            transition: all 0.7s ease;
        }

        .card:hover::after {
            left: 200%;
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(255,255,255,0.3);
            box-shadow: 0 30px 60px -12px rgba(0,0,0,0.9), 0 0 20px rgba(255,255,255,0.05);
            background: rgba(30, 35, 45, 0.6);
        }

        .prediction-card {
            grid-column: 1 / -1;
            padding: 3rem 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            background: linear-gradient(180deg, rgba(25, 30, 40, 0.2) 0%, rgba(15, 20, 25, 0.6) 100%);
            border-top: 1px solid rgba(255,255,255,0.15);
        }

        .status-high { --current-color: var(--danger); --current-glow: var(--danger-glow); }
        .status-low { --current-color: var(--success); --current-glow: var(--success-glow); }
        .status-unknown { --current-color: var(--primary); --current-glow: var(--primary-glow); }

        .orb-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 220px;
            height: 220px;
            margin-bottom: 1.5rem;
        }

        .orb {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ffffff 0%, var(--current-color) 30%, #000000 90%);
            box-shadow: 
                0 0 80px var(--current-glow),
                inset 0 0 40px rgba(255,255,255,0.5),
                inset 20px 0 80px var(--current-color);
            animation: pulse-orb 4s infinite alternate cubic-bezier(0.45, 0.05, 0.55, 0.95);
            transition: all 1s ease;
            z-index: 2;
            overflow: hidden;
        }
        
        /* Inner orb energy effect */
        .orb::after {
            content: '';
            position: absolute;
            inset: -20px;
            background: conic-gradient(from 0deg, transparent 0deg, var(--current-color) 90deg, transparent 180deg);
            animation: spin 4s linear infinite;
            opacity: 0.3;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse-orb {
            0% { transform: scale(0.95); box-shadow: 0 0 50px var(--current-glow), inset 0 0 40px rgba(255,255,255,0.3); }
            100% { transform: scale(1.05); box-shadow: 0 0 100px var(--current-glow), inset 0 0 60px rgba(255,255,255,0.6); }
        }

        .prediction-value-text {
            font-family: 'Outfit', sans-serif;
            position: absolute;
            z-index: 3;
            font-size: 3.5rem;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 4px 20px rgba(0,0,0,0.9), 0 0 30px var(--current-glow);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .prediction-desc {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--current-color);
            opacity: 1;
            text-align: center;
            margin-top: 1rem;
            letter-spacing: 3px;
            text-shadow: 0 0 40px var(--current-glow);
            transition: all 1s ease;
            text-transform: uppercase;
        }

        .card-icon {
            font-size: 2rem;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.2));
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: inset 0 2px 20px rgba(255,255,255,0.05);
        }
        
        .card:hover .card-icon {
            transform: scale(1.15) translateY(-5px);
            border-color: rgba(255,255,255,0.4);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3), inset 0 2px 20px rgba(255,255,255,0.2);
            background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
        }
        
        .card-value {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            color: #ffffff;
            margin: 0.25rem 0;
            line-height: 1;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
            background: linear-gradient(to bottom, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-label::before {
            content: '';
            display: block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        @media (max-width: 1024px) {
            .dashboard { grid-template-columns: repeat(2, 1fr); }
            h1 { font-size: 3.5rem; }
        }

        @media (max-width: 600px) {
            .dashboard { grid-template-columns: 1fr; }
            .orb-container { width: 220px; height: 220px; }
            .prediction-value-text { font-size: 3rem; }
            h1 { font-size: 2.5rem; letter-spacing: -1px; }
        }
    </style>
</head>
<body class="status-unknown" id="body-status">

    <!-- Ambient moving blobs -->
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>

    <div class="container">
        <h1>Cognitive Load AI</h1>
        <p class="subtitle">Next-Gen Real-Time Behavioral Analysis</p>

        <div class="dashboard">
            <!-- Main Prediction Card -->
            <div class="card prediction-card">
                <div class="orb-container">
                    <div class="orb"></div>
                    <div class="prediction-value-text" id="val-prediction">...</div>
                </div>
                <div class="prediction-desc" id="val-desc">Initializing Neural Engine...</div>
            </div>

            <!-- Metric Cards -->
            <div class="card">
                <div class="card-icon">⌨️</div>
                <div class="card-value" id="val-typing">0.0</div>
                <div class="card-label">Keys / Sec</div>
            </div>

            <div class="card">
                <div class="card-icon">🖱️</div>
                <div class="card-value" id="val-mouse">0</div>
                <div class="card-label">Pixels / Sec</div>
            </div>

            <div class="card">
                <div class="card-icon">⚠️</div>
                <div class="card-value" id="val-error">0.00</div>
                <div class="card-label">Error Rate</div>
            </div>

            <div class="card">
                <div class="card-icon">👁️</div>
                <div class="card-value" id="val-blink">0.0</div>
                <div class="card-label">Blinks / Min</div>
            </div>
        </div>
    </div>

    <script>
        // Track values for counter animation
        let prevValues = { typing: 0, mouse: 0, error: 0, blink: 0 };

        function animateValue(obj, start, end, duration, decimals) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                // Ease out function
                const easeOut = 1 - Math.pow(1 - progress, 3);
                const currentVal = start + easeOut * (end - start);
                obj.innerText = currentVal.toFixed(decimals);
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                } else {
                    obj.innerText = end.toFixed(decimals);
                }
            };
            window.requestAnimationFrame(step);
        }

        async function fetchStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();

                // Animate Numbers
                animateValue(document.getElementById('val-typing'), prevValues.typing, data.typing_speed, 800, 1);
                animateValue(document.getElementById('val-mouse'), prevValues.mouse, data.mouse_speed, 800, 0);
                animateValue(document.getElementById('val-error'), prevValues.error, data.error_rate, 800, 2);
                animateValue(document.getElementById('val-blink'), prevValues.blink, data.blink_rate, 800, 1);

                prevValues = {
                    typing: data.typing_speed,
                    mouse: data.mouse_speed,
                    error: data.error_rate,
                    blink: data.blink_rate
                };

                const predEl = document.getElementById('val-prediction');
                const descEl = document.getElementById('val-desc');
                const bodyEl = document.getElementById('body-status');

                predEl.innerText = data.prediction !== "Unknown" ? data.prediction : "...";
                
                // Update styling based on status
                bodyEl.classList.remove("status-low", "status-high", "status-unknown");
                
                if (data.prediction === "High") {
                    bodyEl.classList.add("status-high");
                    descEl.innerText = "Elevated Stress Detected";
                } else if (data.prediction === "Low") {
                    bodyEl.classList.add("status-low");
                    descEl.innerText = "Optimal Focus Maintained";
                } else {
                    bodyEl.className = "status-unknown";
                    descEl.innerText = "Analyzing Stream...";
                }

            } catch (error) {
                console.error("Error fetching data:", error);
            }
        }

        // Poll every 1 second
        setInterval(fetchStatus, 1000);
        fetchStatus(); // initial call
    </script>
</body>
</html>
